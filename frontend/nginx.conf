server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Docker's embedded DNS. Re-resolving (valid=10s) keeps the proxy working
  # when the backend container is recreated and gets a new IP — without this,
  # nginx caches the IP from startup forever and every /api call returns 502.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $backend_upstream backend;

  location /api/ {
    proxy_pass http://$backend_upstream:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    error_page 502 503 504 = @api_unavailable;
  }

  location /socket.io/ {
    proxy_pass http://$backend_upstream:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # API clients always get JSON, never an HTML error page.
  location @api_unavailable {
    default_type application/json;
    add_header Cache-Control "no-store" always;
    return 503 '{"error":"The server is temporarily unavailable. It may be restarting - please retry in a moment."}';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
