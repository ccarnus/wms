  # ── Webhooks ─────────────────────────────────────────────────────────────────
  /webhook/oauth/token:
    post:
      tags: [Webhooks]
      summary: OAuth2 client credentials token endpoint
      description: |
        Issues a short-lived Bearer token for inbound webhook authentication
        when the integration is configured with `oauth2` inbound auth type.
        Accepts either `application/x-www-form-urlencoded` or `application/json`.
        Client credentials may be sent in the body or via HTTP Basic auth.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum: [client_credentials]
                client_id:
                  type: string
                client_secret:
                  type: string
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum: [client_credentials]
                client_id:
                  type: string
                client_secret:
                  type: string
      responses:
        "200":
          description: Access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    description: Seconds until expiry
        "401":
          $ref: "#/components/responses/Unauthorized"

  /webhook/{connectorType}:
    post:
      tags: [Webhooks]
      summary: Inbound webhook event receiver
      description: |
        Receives external system events (order.created, order.cancelled,
        product.synced, etc.). Authentication method depends on the
        integration's `inboundAuthType` setting (`none`, `apikey`,
        `basic`, `bearer`, `oauth2`).
      security: []
      parameters:
        - name: connectorType
          in: path
          required: true
          schema:
            type: string
            example: generic-webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Connector-specific event payload
              properties:
                event_type:
                  type: string
                  example: inbound.order.created
      responses:
        "200":
          description: Event received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
                  eventType:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

# ─────────────────────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    intId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    operatorId:
      name: operatorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    taskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    salesOrderId:
      name: salesOrderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    purchaseOrderId:
      name: purchaseOrderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    userId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Optimistic lock conflict or invalid state transition
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Resource not found

    PaginatedResponse:
      type: object
      properties:
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer

    # ── Enums ──────────────────────────────────────────────────────────────────
    OperatorStatus:
      type: string
      enum: [available, busy, offline]

    TaskStatus:
      type: string
      enum: [created, assigned, in_progress, paused, completed, cancelled, failed]

    ZoneType:
      type: string
      enum: [pick, bulk, dock, staging, packing]

    LocationType:
      type: string
      enum: [rack, shelf, bin, floor, dock, staging]

    LocationStatus:
      type: string
      enum: [active, locked]

    UserRole:
      type: string
      enum: [admin, warehouse_manager, supervisor, operator, viewer]

    SalesOrderStatus:
      type: string
      enum: [pending_inventory, ready, released, completed, cancelled]

    PurchaseOrderStatus:
      type: string
      enum: [received, pending_capacity, in_progress, completed, cancelled]

    ShipmentStatus:
      type: string
      enum: [pending, labeled, dispatched, delivered]

    IntegrationDirection:
      type: string
      enum: [inbound, outbound, bidirectional]

    MovementType:
      type: string
      enum: [INBOUND, OUTBOUND, TRANSFER, ADJUSTMENT]

    # ── Core entities ──────────────────────────────────────────────────────────
    Operator:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
        status:
          $ref: "#/components/schemas/OperatorStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: "e.g. pick, putaway, pack"
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          type: integer
        version:
          type: integer
          description: Optimistic lock version — must be passed back on transitions
        assignedOperatorId:
          type: string
          format: uuid
          nullable: true
        zoneId:
          type: integer
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        actualTimeSeconds:
          type: integer
          nullable: true
        estimatedTimeSeconds:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lines:
          type: array
          items:
            $ref: "#/components/schemas/TaskLine"

    TaskLine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        skuId:
          type: integer
        quantity:
          type: integer
        fromLocationId:
          type: integer
          nullable: true
        toLocationId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [created, in_progress, completed, cancelled, failed]

    TaskTransitionBody:
      type: object
      required: [version]
      properties:
        version:
          type: integer
          description: Current task version (optimistic lock)
        changedByOperatorId:
          type: string
          format: uuid
          nullable: true

    Warehouse:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        locationCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    Zone:
      type: object
      properties:
        id:
          type: integer
        warehouseId:
          type: integer
        name:
          type: string
        type:
          $ref: "#/components/schemas/ZoneType"
        locationCount:
          type: integer

    Location:
      type: object
      properties:
        id:
          type: integer
        zoneId:
          type: integer
        code:
          type: string
        name:
          type: string
        status:
          $ref: "#/components/schemas/LocationStatus"
        type:
          $ref: "#/components/schemas/LocationType"
        capacity:
          type: integer
        warehouseId:
          type: integer
        warehouseName:
          type: string
        zoneName:
          type: string

    SKU:
      type: object
      properties:
        id:
          type: integer
        sku:
          type: string
        description:
          type: string
          nullable: true
        weightKg:
          type: number
          nullable: true
        dimensionXCm:
          type: number
          nullable: true
        dimensionYCm:
          type: number
          nullable: true
        dimensionZCm:
          type: number
          nullable: true
        pictureUrl:
          type: string
          format: uri
          nullable: true
        barcodes:
          type: array
          items:
            type: string
        totalQuantity:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SKUInput:
      type: object
      required: [sku]
      properties:
        sku:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        weightKg:
          type: number
          minimum: 0
        dimensionXCm:
          type: number
          minimum: 0
        dimensionYCm:
          type: number
          minimum: 0
        dimensionZCm:
          type: number
          minimum: 0
        pictureUrl:
          type: string
          format: uri
          maxLength: 2048
        barcodes:
          type: array
          maxItems: 20
          items:
            type: string

    InventoryRecord:
      type: object
      properties:
        skuId:
          type: integer
        sku:
          type: string
        description:
          type: string
          nullable: true
        locationId:
          type: integer
        locationCode:
          type: string
        locationName:
          type: string
        zoneId:
          type: integer
        zoneName:
          type: string
        warehouseId:
          type: integer
        warehouseName:
          type: string
        quantity:
          type: integer

    Movement:
      type: object
      properties:
        id:
          type: integer
        skuId:
          type: integer
        sku:
          type: string
        quantity:
          type: integer
        movementType:
          $ref: "#/components/schemas/MovementType"
        fromLocationId:
          type: integer
          nullable: true
        toLocationId:
          type: integer
          nullable: true
        reference:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    MovementInput:
      type: object
      required: [skuId, quantity]
      properties:
        skuId:
          type: integer
        quantity:
          type: integer
          minimum: 1
        fromLocationId:
          type: integer
          nullable: true
        toLocationId:
          type: integer
          nullable: true
        reference:
          type: string

    SalesOrderInput:
      type: object
      required: [sourceDocumentId, lines]
      properties:
        sourceDocumentId:
          type: string
          description: External document ID (idempotency key)
        lines:
          type: array
          minItems: 1
          items:
            type: object
            required: [skuId, quantity]
            properties:
              skuId:
                type: integer
              quantity:
                type: integer
                minimum: 1

    SalesOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sourceDocumentId:
          type: string
        status:
          $ref: "#/components/schemas/SalesOrderStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lines:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              skuId:
                type: integer
              sku:
                type: string
              quantity:
                type: integer
              status:
                type: string
                enum: [pending, resolved, short]

    PurchaseOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sourceDocumentId:
          type: string
        status:
          $ref: "#/components/schemas/PurchaseOrderStatus"
        strategy:
          type: string
          enum: [RANDOM, CONSOLIDATION, EMPTY]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lines:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              skuId:
                type: integer
              sku:
                type: string
              quantity:
                type: integer

    InventoryAlert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        salesOrderId:
          type: string
          format: uuid
        skuId:
          type: integer
        sku:
          type: string
        requestedQuantity:
          type: integer
        availableQuantity:
          type: integer
        status:
          type: string
          enum: [active, resolved, dismissed]
        createdAt:
          type: string
          format: date-time

    ReevaluateStats:
      type: object
      properties:
        evaluated:
          type: integer
        released:
          type: integer
        stillPending:
          type: integer

    Shipment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        salesOrderId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/ShipmentStatus"
        carrier:
          type: string
          nullable: true
        trackingNumber:
          type: string
          nullable: true
        labelUrl:
          type: string
          format: uri
          nullable: true
        dispatchedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    OrderEventInput:
      type: object
      required: [type, sourceDocumentId, lines]
      properties:
        type:
          type: string
          description: "Event type: OUTBOUND_ORDER or INBOUND_ORDER"
          example: OUTBOUND_ORDER
        sourceDocumentId:
          type: string
        lines:
          type: array
          minItems: 1
          items:
            type: object
            required: [skuId, quantity]
            properties:
              skuId:
                type: integer
              quantity:
                type: integer
                minimum: 1

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        operatorId:
          type: string
          format: uuid
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Integration:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        connectorType:
          type: string
          example: generic-webhook
        direction:
          $ref: "#/components/schemas/IntegrationDirection"
        isEnabled:
          type: boolean
        webhookUrl:
          type: string
          format: uri
          nullable: true
        outboundAuthType:
          type: string
          enum: [none, header, basic, jwt, oauth2]
          nullable: true
        inboundAuthType:
          type: string
          enum: [none, apikey, basic, bearer, oauth2]
          nullable: true
        createdAt:
          type: string
          format: date-time

    IntegrationInput:
      type: object
      required: [name, connectorType, direction]
      properties:
        name:
          type: string
        connectorType:
          type: string
          example: generic-webhook
        direction:
          $ref: "#/components/schemas/IntegrationDirection"
        webhookUrl:
          type: string
          format: uri
        outboundAuthType:
          type: string
          enum: [none, header, basic, jwt, oauth2]
        outboundAuthConfig:
          type: object
          description: Auth credentials/config — shape depends on outboundAuthType
          additionalProperties: true
        inboundAuthType:
          type: string
          enum: [none, apikey, basic, bearer, oauth2]
        inboundAuthConfig:
          type: object
          description: Auth validation config — shape depends on inboundAuthType
          additionalProperties: true
        fieldMappings:
          type: array
          items:
            type: object
            properties:
              sourceField:
                type: string
              targetField:
                type: string

    IntegrationEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        integrationId:
          type: integer
        direction:
          $ref: "#/components/schemas/IntegrationDirection"
        eventType:
          type: string
        status:
          type: string
          enum: [pending, success, failed]
        requestPayload:
          type: object
          nullable: true
        responseStatus:
          type: integer
          nullable: true
        responseBody:
          type: string
          nullable: true
        attemptCount:
          type: integer
        createdAt:
          type: string
          format: date-time

