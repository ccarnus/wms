openapi: 3.1.0
info:
  title: GreenLights WMS API
  version: 1.0.0
  description: |
    Warehouse Management System API for GreenLights.

    **Authentication**: All endpoints except `/api/health`, `/api/auth/login`,
    `/api/webhook/*`, and `/api/webhook/oauth/token` require a JWT Bearer token
    obtained from `POST /api/auth/login`.

servers:
  - url: https://test.greenlights.us/api
    description: Same-origin (default)

security:
  - bearerAuth: []

tags:
  - name: Health
  - name: Auth
  - name: Operators
  - name: Tasks
  - name: Labor
  - name: Sales Orders
  - name: Purchase Orders
  - name: Shipments
  - name: Order Events
  - name: WMS
  - name: Warehouses
  - name: Zones
  - name: Locations
  - name: SKUs
  - name: Users
  - name: Integrations
  - name: Webhooks

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── Health ──────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: wms-backend
                  timestamp:
                    type: string
                    format: date-time

  # ── Auth ────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
                  example: admin123
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT Bearer token (8h expiry)
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      responses:
        "200":
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Operators ───────────────────────────────────────────────────────────────
  /operators:
    get:
      tags: [Operators]
      summary: List operators
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/OperatorStatus"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated operator list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Operator"

  /operators/{operatorId}:
    get:
      tags: [Operators]
      summary: Get operator by ID
      parameters:
        - $ref: "#/components/parameters/operatorId"
      responses:
        "200":
          description: Operator object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operator"
        "404":
          $ref: "#/components/responses/NotFound"

  /operators/{operatorId}/status:
    patch:
      tags: [Operators]
      summary: Update operator status
      parameters:
        - $ref: "#/components/parameters/operatorId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/OperatorStatus"
      responses:
        "200":
          description: Updated operator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operator"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Tasks ───────────────────────────────────────────────────────────────────
  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: operatorId
          in: query
          schema:
            type: string
            format: uuid
        - name: zoneId
          in: query
          schema:
            type: integer
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated task list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Task"

  /tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: Get task by ID
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "200":
          description: Task object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"

  /tasks/{taskId}/assign:
    post:
      tags: [Tasks]
      summary: Manually assign task to an operator
      parameters:
        - $ref: "#/components/parameters/taskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [operatorId]
              properties:
                operatorId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Task assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /tasks/{taskId}/start:
    post:
      tags: [Tasks]
      summary: Start a task (assigned → in_progress)
      parameters:
        - $ref: "#/components/parameters/taskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskTransitionBody"
      responses:
        "200":
          description: Task started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /tasks/{taskId}/complete:
    post:
      tags: [Tasks]
      summary: Complete a task (in_progress → completed)
      parameters:
        - $ref: "#/components/parameters/taskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/TaskTransitionBody"
                - type: object
                  properties:
                    boxType:
                      type: string
                    weightGrams:
                      type: number
                    lengthCm:
                      type: number
                    widthCm:
                      type: number
                    heightCm:
                      type: number
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /tasks/{taskId}/pause:
    post:
      tags: [Tasks]
      summary: Pause a task (in_progress → paused)
      parameters:
        - $ref: "#/components/parameters/taskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskTransitionBody"
      responses:
        "200":
          description: Task paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /tasks/{taskId}/cancel:
    post:
      tags: [Tasks]
      summary: Cancel a task
      parameters:
        - $ref: "#/components/parameters/taskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskTransitionBody"
      responses:
        "200":
          description: Task cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /tasks/{taskId}/status:
    patch:
      tags: [Tasks]
      summary: Generic status transition
      parameters:
        - $ref: "#/components/parameters/taskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/TaskTransitionBody"
                - type: object
                  required: [status]
                  properties:
                    status:
                      $ref: "#/components/schemas/TaskStatus"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Labor ───────────────────────────────────────────────────────────────────
  /labor/overview:
    get:
      tags: [Labor]
      summary: Labor overview for a given date
      parameters:
        - name: date
          in: query
          description: "Date in YYYY-MM-DD format (defaults to today)"
          schema:
            type: string
            format: date
            example: "2026-04-17"
      responses:
        "200":
          description: Labor overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaborOverview"

  /labor/operator-performance:
    get:
      tags: [Labor]
      summary: Per-operator performance metrics for a given date
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated operator performance
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/OperatorPerformance"

  /labor/zone-workload:
    get:
      tags: [Labor]
      summary: Task workload per zone
      parameters:
        - name: warehouse_id
          in: query
          schema:
            type: integer
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated zone workload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ZoneWorkload"

  # ── Sales Orders ─────────────────────────────────────────────────────────────
  /sales-orders:
    post:
      tags: [Sales Orders]
      summary: Create a sales order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesOrderInput"
      responses:
        "201":
          description: Sales order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "200":
          description: Duplicate — order with this sourceDocumentId already exists (skipped)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Sales Orders]
      summary: List sales orders
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/SalesOrderStatus"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated sales order list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/SalesOrder"

  /sales-orders/alerts:
    get:
      tags: [Sales Orders]
      summary: List active inventory alerts for sales orders
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated alert list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/InventoryAlert"

  /sales-orders/reevaluate:
    post:
      tags: [Sales Orders]
      summary: Re-evaluate all pending_inventory sales orders
      responses:
        "200":
          description: Reevaluation statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReevaluateStats"

  /sales-orders/{salesOrderId}:
    get:
      tags: [Sales Orders]
      summary: Get sales order by ID
      parameters:
        - $ref: "#/components/parameters/salesOrderId"
      responses:
        "200":
          description: Sales order with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Sales Orders]
      summary: Cancel a sales order
      parameters:
        - $ref: "#/components/parameters/salesOrderId"
      responses:
        "200":
          description: Cancelled sales order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Purchase Orders ──────────────────────────────────────────────────────────
  /purchase-orders:
    get:
      tags: [Purchase Orders]
      summary: List purchase orders
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/PurchaseOrderStatus"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated purchase order list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/PurchaseOrder"

  /purchase-orders/reevaluate:
    post:
      tags: [Purchase Orders]
      summary: Re-evaluate all pending_capacity purchase orders
      responses:
        "200":
          description: Reevaluation statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReevaluateStats"

  /purchase-orders/{purchaseOrderId}:
    get:
      tags: [Purchase Orders]
      summary: Get purchase order by ID
      parameters:
        - $ref: "#/components/parameters/purchaseOrderId"
      responses:
        "200":
          description: Purchase order with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Purchase Orders]
      summary: Cancel a purchase order
      parameters:
        - $ref: "#/components/parameters/purchaseOrderId"
      responses:
        "200":
          description: Cancelled purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Shipments ────────────────────────────────────────────────────────────────
  /shipments:
    get:
      tags: [Shipments]
      summary: List shipments
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ShipmentStatus"
        - name: date
          in: query
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated shipment list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Shipment"

  /shipments/manifest:
    get:
      tags: [Shipments]
      summary: End-of-day dispatch manifest
      description: Requires admin, warehouse_manager, or supervisor role.
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Manifest for the date
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                  shipments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Shipment"
        "403":
          $ref: "#/components/responses/Forbidden"

  /shipments/dispatch:
    post:
      tags: [Shipments]
      summary: Dispatch one or more shipments
      description: Requires admin, warehouse_manager, or supervisor role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [shipmentIds]
              properties:
                shipmentIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Dispatch result
          content:
            application/json:
              schema:
                type: object
                properties:
                  dispatched:
                    type: integer
                  shipments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Shipment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /shipments/{shipmentId}/label:
    patch:
      tags: [Shipments]
      summary: Attach shipping label to a shipment
      description: Requires admin, warehouse_manager, or supervisor role.
      parameters:
        - name: shipmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [carrier, trackingNumber, labelUrl]
              properties:
                carrier:
                  type: string
                trackingNumber:
                  type: string
                labelUrl:
                  type: string
                  format: uri
      responses:
        "200":
          description: Updated shipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Order Events ─────────────────────────────────────────────────────────────
  /order-events:
    post:
      tags: [Order Events]
      summary: Submit a task generation event
      description: Enqueues an order event that generates pick or putaway tasks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderEventInput"
      responses:
        "202":
          description: Event accepted and queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: boolean
                    example: true
                  type:
                    type: string
                  sourceDocumentId:
                    type: string
                  eventKey:
                    type: string
                  queueName:
                    type: string
                  jobId:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── WMS ──────────────────────────────────────────────────────────────────────
  /summary:
    get:
      tags: [WMS]
      summary: Warehouse summary counts
      responses:
        "200":
          description: Aggregate counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  warehouseCount:
                    type: integer
                  locationCount:
                    type: integer
                  skuCount:
                    type: integer
                  totalUnits:
                    type: integer

  /inventory:
    get:
      tags: [WMS]
      summary: Full inventory listing
      responses:
        "200":
          description: All inventory records with SKU, location, and warehouse info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryRecord"

  /movements:
    get:
      tags: [WMS]
      summary: Recent inventory movements
      parameters:
        - name: limit
          in: query
          description: Number of movements to return (max 100, default 20)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Movement records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movement"
    post:
      tags: [WMS]
      summary: Record an inventory movement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovementInput"
      responses:
        "201":
          description: Movement recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movement"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Warehouses ───────────────────────────────────────────────────────────────
  /warehouses:
    get:
      tags: [Warehouses]
      summary: List warehouses
      responses:
        "200":
          description: Warehouses with location counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Warehouse"
    post:
      tags: [Warehouses]
      summary: Create a warehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name]
              properties:
                code:
                  type: string
                  example: WH-EAST-01
                name:
                  type: string
                  example: East Coast Fulfillment
      responses:
        "201":
          description: Created warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /warehouses/{id}:
    get:
      tags: [Warehouses]
      summary: Get warehouse by ID
      parameters:
        - $ref: "#/components/parameters/intId"
      responses:
        "200":
          description: Warehouse object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Warehouses]
      summary: Update warehouse
      parameters:
        - $ref: "#/components/parameters/intId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                name:
                  type: string
      responses:
        "200":
          description: Updated warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Warehouses]
      summary: Delete warehouse
      parameters:
        - $ref: "#/components/parameters/intId"
      responses:
        "204":
          description: Deleted
        "404":
